<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI&DS Portal Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:
    radial-gradient(circle at top right,
    rgba(59,130,246,0.18),
    transparent 35%),

    radial-gradient(circle at bottom left,
    rgba(99,102,241,0.12),
    transparent 35%),

    linear-gradient(
    135deg,
    #020617,
    #0f172a,
    #1e293b
    );
}

.header {
    text-align: center;
    margin-top: 80px;
    margin-bottom: 40px;
}

.back-btn {
    display: inline-block;
    margin-top: 30px;
    margin-left: 30px;
}

.header h1{
    font-size:40px;
    color:white;
}

.header p{
    color:#b8c1d1;
    margin-top:5px;
}

.container{
    padding:30px;

    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));

    gap:25px;
    justify-items:center;
}

.card{
    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:20px;

    width:100%;
max-width:350px;

    padding:30px;

    box-shadow:0 8px 30px rgba(0,0,0,0.3);

    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);

    border:1px solid rgba(59,130,246,0.5);

    box-shadow:0 12px 35px rgba(37,99,235,0.25);
}

.card h2{
    margin-bottom:20px;
    color:#ffffff;
    font-weight:600;
}
.btns{
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:12px;

    border:none;
    border-radius:10px;

    background:#2563eb;
    color:white;

    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#3b82f6;
}

.back-btn{
    display:inline-block;
    margin-top:15px;
    margin-left:30px;
    margin-bottom:20px;
    padding:10px 18px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:600;
    transition:0.3s;
}

.back-btn:hover{
    background:#3b82f6;
    transform:translateY(-2px);
}

/* ✅ MOBILE FIX */
@media (max-width: 768px) {

  .header {
    margin-top: 30px;
    margin-bottom: 20px;
    padding: 0 15px;
  }

  .header h1 {
    font-size: 28px;
  }

  .header p {
    font-size: 14px;
  }

  .back-btn {
    margin-top: 10px;
    margin-left: 10px;
  }

  .container {
    padding: 20px;
    grid-template-columns: 1fr;
  }

  .card {
    width: 100%;
  }

</style>

</head>

<body>
